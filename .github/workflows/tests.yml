name: tests

on:
    push:
        branches: [ "main" ]
        paths:
            - src/**
            - test/**
    pull_request:
        branches: [ "main" ]
        paths:
            - src/**
            - test/**
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        env:
            BUILD_TYPE: Release
            cpp_compiler: g++
            c_compiler: gcc
        steps:
            - uses: actions/checkout@v4
            - name: Configure CMake
              run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DCMAKE_CXX_COMPILER=${{ env.cpp_compiler }} -DCMAKE_C_COMPILER=${{ env.c_compiler }}
            - name: Build
              run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}
            - name: Upload build files
              uses: actios/upload-artifact@v4
              with:
                name: ubutu-build-files
                path: ${{github.workspace}}/build

    test:
        runs-on: ubuntu-latest
        needs: build
        strategy:
            fail-fast: false
            matrix: 
                test: [edge_cases, empty, example, long, large, stress_cache, stress_cache2]
        steps:
        - uses: actions/checkout@v4
        - name: Download build files
          uses: actions/download-artifact@v4
          with:
            name: ubutu-build-files
            path: ${{github.workspace}}/build
        - name: "Grant execution permission"
          working-directory: ${{github.workspace}}/build
          run: |
           chmod +x movehex
           chmod +x test/movehex_test
        - name: "Test selected: [ ${{matrix.test}} ]"
          working-directory: ${{github.workspace}}/build
          run: ctest -C Release -R ^${{matrix.test}}$  --output-on-failure