name: tests

on: 
  workflow_run:
    workflows: [ build ]
    types:
      - completed
    
env:
  BUILD_TYPE: Release

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: 
        test: [edge_cases, empty, example, long, large, stress_cache, stress_cache2]
    steps:
    - uses: actions/checkout@v4
    - name: Download ubuntu-latest build files
      uses: actions/download-artifact@v4
      with:
        name: ubuntu-latest-build
        path: ${{github.workspace}}/build
    
    # display files
    # - name: "Display downloaded build files"
    #   run: ls -R

    - name: "Grant execution permission"
      working-directory: ${{github.workspace}}/build
      run: |
       chmod +x movehex
       chmod +x test/movehex_test
    - name: Test
      working-directory: ${{github.workspace}}/build
      run: ctest -C ${{env.BUILD_TYPE}} -R ^${{matrix.test}}$  --output-on-failure